        - hwif_rec_in.DEVICE_ID_0.VENDOR_SPECIFIC_STR_LENGTH.next
        - hwif_rec_in.DEVICE_ID_0.DESC_TYPE.we
        - hwif_rec_in.DEVICE_ID_0.DESC_TYPE.next
        - hwif_rec_in.PROT_CAP_3.HEARTBEAT_PERIOD.we
