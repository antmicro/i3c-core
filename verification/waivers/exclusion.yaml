        - hwif_tti_out.INTERRUPT_STATUS.TRANSFER_ABORT_STAT.value
        - hwif_tti_out.INTERRUPT_STATUS.IBI_THLD_STAT.value
        - hwif_tti_out.INTERRUPT_STATUS.TX_DESC_THLD_STAT.value
        - hwif_tti_out.INTERRUPT_STATUS.TX_DATA_THLD_STAT.value
