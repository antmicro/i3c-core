        - hwif_soc_mgmt_out.EXTCAP_HEADER.CAP_LENGTH.value
        - hwif_soc_mgmt_out.EXTCAP_HEADER.CAP_ID.value
        - hwif_out.I3C_EC.TTI.IBI_QUEUE_SIZE.IBI_QUEUE_SIZE.value
        - hwif_out.I3C_EC.TTI.EXTCAP_HEADER.CAP_LENGTH.value
