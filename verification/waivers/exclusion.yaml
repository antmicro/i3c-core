        - hwif_out.I3C_EC.SecFwRecoveryIf.INDIRECT_FIFO_STATUS_1.WRITE_INDEX.value: [6-31]

      Tied to 0:
        toggle:
        - hwif_rec_in.DEVICE_STATUS_0.REC_REASON_CODE.we
        - hwif_rec_in.DEVICE_STATUS_0.REC_REASON_CODE.next
        - hwif_rec_in.DEVICE_STATUS_0.DEV_STATUS.we
        - hwif_rec_in.DEVICE_STATUS_0.DEV_STATUS.next
        - hwif_soc_mgmt_in.REC_INTF_REG_W1C_ACCESS.INDIRECT_FIFO_CTRL_RESET.next
        - hwif_soc_mgmt_in.REC_INTF_REG_W1C_ACCESS.RECOVERY_CTRL_ACTIVATE_REC_IMG.next
        - hwif_soc_mgmt_in.REC_INTF_REG_W1C_ACCESS.DEVICE_RESET_CTRL.next
        - hwif_soc_mgmt_in.REC_INTF_CFG.REC_PAYLOAD_DONE.next
