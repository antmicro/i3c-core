  axi_adapter:
    source_path: src/hci/axi_adapter.sv
    source_sha: df73e1d7a5642d8e65bb01cd05a47ad6a15c6f65979975efd9a5a9670a8b621e
    all:
      CSR addresses are aligned to 4 bytes:
        toggle:
        - araddr_i: [0-1]
        - awaddr_i: [0-1]
        - s_cpuif_addr: [0-1]
        - i3c_req_addr: [0-1]
        - i3c_req_size: [2]

      High address bits not used in target only configs:
        toggle:
        - araddr_i: [10-11]
        - awaddr_i: [10-11]
        - i3c_req_addr: [10-11]

      BUSER is unimplemented (tied to 0):
        toggle:
        - buser_o

      RUSER is unimplemented (tied to 0):
        toggle:
        - ruser_o

      Data width is only 32-bit:
        toggle:
        - arsize_i: [2]
        - awsize_i: [2]

      Neither EXOKAY nor DECERR are issued:
        toggle:
        - rresp_o: [0]
        - bresp_o: [0]

      RDL code doesn't generate access errors:
        toggle:
        - s_cpuif_rd_err
        - s_cpuif_wr_err


