        - hwif_tti_in.INTERRUPT_STATUS.IBI_THLD_STAT.we
        - hwif_tti_in.INTERRUPT_STATUS.IBI_THLD_STAT.next
        - hwif_tti_in.INTERRUPT_STATUS.TX_DESC_THLD_STAT.we
        - hwif_tti_in.INTERRUPT_STATUS.TX_DESC_THLD_STAT.next
        - hwif_tti_in.INTERRUPT_STATUS.TX_DATA_THLD_STAT.we
        - hwif_tti_in.INTERRUPT_STATUS.TX_DATA_THLD_STAT.next
        - hwif_tti_in.INTERRUPT_STATUS.TX_DESC_TIMEOUT.we
        - hwif_tti_in.INTERRUPT_STATUS.TX_DESC_TIMEOUT.next
        - hwif_tti_in.INTERRUPT_STATUS.RX_DESC_TIMEOUT.we
        - hwif_tti_in.INTERRUPT_STATUS.RX_DESC_TIMEOUT.next

      FIFO depth limited to 64 entries:
        toggle:
        - hwif_rec_in.INDIRECT_FIFO_STATUS_2.READ_INDEX.next: [6-31]
