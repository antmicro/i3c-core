        - csr_tti_ibi_reg_rst_data
        - csr_tti_tx_data_reg_rst_data
        - csr_tti_rx_data_reg_rst_data
        - csr_tti_tx_desc_reg_rst_data
        - csr_tti_rx_desc_reg_rst_data
        - recovery_irq
        - ctl_irq
        - hwif_tti_in.INTERRUPT_STATUS.PENDING_INTERRUPT.we
        - hwif_tti_in.INTERRUPT_STATUS.PENDING_INTERRUPT.next
        - hwif_out.I3C_EC.StdbyCtrlMode.EXTCAP_HEADER.CAP_LENGTH.value
        - hwif_out.I3C_EC.TTI.QUEUE_SIZE.TX_DATA_BUFFER_SIZE.value
        - hwif_out.I3C_EC.TTI.QUEUE_SIZE.RX_DATA_BUFFER_SIZE.value
        - hwif_out.I3C_EC.StdbyCtrlMode.STBY_CR_CAPABILITIES.DAA_SETAASA_SUPPORT.value
        - hwif_out.I3C_EC.TTI.QUEUE_SIZE.RX_DESC_BUFFER_SIZE.value
        - hwif_out.I3C_EC.SoCMgmtIf.EXTCAP_HEADER.CAP_ID.value
        - hwif_out.I3C_EC.TERMINATION_EXTCAP_HEADER.CAP_LENGTH.value
        - hwif_out.I3C_EC.SoCMgmtIf.EXTCAP_HEADER.CAP_LENGTH.value
        - hwif_out.I3C_EC.StdbyCtrlMode.STBY_CR_CAPABILITIES.TARGET_XACT_SUPPORT.value
        - hwif_out.I3C_EC.CtrlCfg.EXTCAP_HEADER.CAP_LENGTH.value
        - hwif_out.I3C_EC.TERMINATION_EXTCAP_HEADER.CAP_ID.value
        - hwif_out.I3C_EC.StdbyCtrlMode.STBY_CR_CAPABILITIES.SIMPLE_CRR_SUPPORT.value
        - hwif_out.I3C_EC.TTI.QUEUE_SIZE.TX_DESC_BUFFER_SIZE.value
        - hwif_out.I3C_EC.StdbyCtrlMode.EXTCAP_HEADER.CAP_ID.value
        - hwif_out.I3C_EC.StdbyCtrlMode.STBY_CR_CAPABILITIES.DAA_ENTDAA_SUPPORT.value
        - hwif_out.I3C_EC.StdbyCtrlMode.STBY_CR_CAPABILITIES.DAA_SETDASA_SUPPORT.value
        - hwif_out.I3C_EC.CtrlCfg.EXTCAP_HEADER.CAP_ID.value

      Reserved:
        toggle:
        - hwif_rec_in.DEVICE_STATUS_0.PROT_ERROR.next: [3-7]
        - hwif_out.I3C_EC.SecFwRecoveryIf.INDIRECT_FIFO_RESERVED.DATA.value
        - hwif_rec_out.DEVICE_ID_RESERVED.DATA.value
        - hwif_out.I3C_EC.SecFwRecoveryIf.DEVICE_ID_RESERVED.DATA.value
        - hwif_rec_in.HW_STATUS.RESERVED_7_3.next
        - hwif_rec_in.INDIRECT_FIFO_RESERVED.DATA.we
        - hwif_rec_in.INDIRECT_FIFO_RESERVED.DATA.next
        - hwif_out.I3C_EC.StdbyCtrlMode.__rsvd_3.__rsvd.value
        - hwif_rec_in.HW_STATUS.RESERVED_7_3.we
        - hwif_rec_out.INDIRECT_FIFO_RESERVED.DATA.value

      Only 2 status values are implemented:
        toggle:
        - hwif_rec_in.DEVICE_STATUS_0.PROT_ERROR.next: [0-1]

      Controller mode placeholder CSRs:
        toggle:
        - hwif_out.I3C_EC.CtrlCfg.CONTROLLER_CONFIG.OPERATION_MODE.value

      CSR addresses are aligned to 4 bytes:
        toggle:
        - araddr_i: [0-1]
        - awaddr_i: [0-1]
        - s_cpuif_addr: [0-1]

      High address bits not used in target only configs:
        toggle:
        - araddr_i: [10-11]
        - awaddr_i: [10-11]

      BUSER is unimplemented (tied to 0):
        toggle:
        - buser_o

      RUSER is unimplemented (tied to 0):
        toggle:
        - ruser_o

      Data width is only 32-bit:
        toggle:
        - arsize_i: [2]
        - awsize_i: [2]

      Neither EXOKAY nor DECERR are issued:
        toggle:
        - rresp_o: [0]
        - bresp_o: [0]

      RDL code doesn't generate access errors:
        toggle:
        - s_cpuif_rd_err
        - s_cpuif_wr_err

      Target mode only:
        toggle:
        - i3c_scl_o

      Not used in target only configurations:
        toggle:
        - ctrl2phy_scl

      Resolves to 0 in all combinatorial paths:
        toggle:
        - tti_tx_host_nack

      Reserved upper 3 bits of the RX descriptor ERROR field:
        toggle:
        - csr_tti_rx_desc_data: [29-31]
        - tti_rx_desc_wdata: [29-31]
        - hwif_tti_in.RX_DESC_QUEUE_PORT.rd_data.RX_DESC: [29-31]

      Meaningless bits:
        toggle:
        - csr_tti_rx_desc_data: [16-27]
        - tti_rx_desc_wdata: [16-27]

      Unachievable RX descriptor DATA_LENGTH field values:
        toggle:
        - csr_tti_rx_desc_data: [9-15]
        - tti_rx_desc_wdata: [9-15]
        - hwif_tti_in.RX_DESC_QUEUE_PORT.rd_data.RX_DESC: [9-15]

      Unused in 64 FIFO depth configurations:
        toggle:
        - tti_rx_desc_ready_thld: [6-7]
        - csr_tti_rx_desc_ready_thld_o: [6-7]
        - tti_tx_desc_ready_thld: [6-7]
        - csr_tti_tx_desc_ready_thld_o: [6-7]
        - hwif_tti_in.QUEUE_THLD_CTRL.RX_DESC_THLD.next: [6-7]
        - hwif_tti_in.QUEUE_THLD_CTRL.TX_DESC_THLD.next: [6-7]

      Tied off:
        toggle:
        - hwif_tti_in.RX_DESC_QUEUE_PORT.rd_data.RX_DESC: [16-27]

      Not driven by HW:
        toggle:
        - hwif_tti_in.QUEUE_THLD_CTRL.IBI_THLD.we
        - hwif_tti_in.QUEUE_THLD_CTRL.IBI_THLD.next

      hwclr CSR:
        toggle:
        - hwif_tti_in.RESET_CONTROL.SOFT_RST.hwclr

      Unused:
        toggle:
        - hwif_rec_in.HW_STATUS.VENDOR_HW_STATUS_LEN.we
        - hwif_rec_in.HW_STATUS.VENDOR_HW_STATUS_LEN.next
        - hwif_rec_in.HW_STATUS.CTEMP.we
        - hwif_rec_in.HW_STATUS.CTEMP.next
        - hwif_rec_in.HW_STATUS.VENDOR_HW_STATUS.we
        - hwif_rec_in.HW_STATUS.VENDOR_HW_STATUS.next
        - hwif_rec_in.HW_STATUS.FATAL_ERR.we
        - hwif_rec_in.HW_STATUS.FATAL_ERR.next
        - hwif_rec_in.HW_STATUS.SOFT_ERR.we
        - hwif_rec_in.HW_STATUS.SOFT_ERR.next
        - hwif_rec_in.HW_STATUS.TEMP_CRITICAL.we
        - hwif_rec_in.HW_STATUS.TEMP_CRITICAL.next
        - hwif_rec_in.RECOVERY_STATUS.VENDOR_SPECIFIC_STATUS.we
        - hwif_rec_in.RECOVERY_STATUS.VENDOR_SPECIFIC_STATUS.next
        - hwif_rec_in.RECOVERY_STATUS.REC_IMG_INDEX.we
        - hwif_rec_in.RECOVERY_STATUS.REC_IMG_INDEX.next
        - hwif_rec_in.RECOVERY_STATUS.DEV_REC_STATUS.we
        - hwif_rec_in.RECOVERY_STATUS.DEV_REC_STATUS.next
        - hwif_rec_in.DEVICE_STATUS_1.VENDOR_STATUS.we
        - hwif_rec_in.DEVICE_STATUS_1.VENDOR_STATUS.next
        - hwif_rec_in.DEVICE_STATUS_1.VENDOR_STATUS_LENGTH.we
        - hwif_rec_in.DEVICE_STATUS_1.VENDOR_STATUS_LENGTH.next
        - hwif_rec_in.DEVICE_STATUS_1.HEARTBEAT.we
        - hwif_rec_in.DEVICE_STATUS_1.HEARTBEAT.next
        - hwif_rec_in.DEVICE_ID_5.DATA.we
        - hwif_rec_in.DEVICE_ID_5.DATA.next
        - hwif_rec_in.DEVICE_ID_4.DATA.we
        - hwif_rec_in.DEVICE_ID_4.DATA.next
        - hwif_rec_in.DEVICE_ID_3.DATA.we
