        - hwif_tti_out.TX_DATA_PORT.wr_biten.TX_DATA
        - hwif_tti_out.TX_DESC_QUEUE_PORT.wr_biten.TX_DESC
        - hwif_out.I3C_EC.TTI.IBI_PORT.wr_biten.IBI_DATA
        - hwif_out.I3C_EC.TTI.TX_DATA_PORT.wr_biten.TX_DATA
        - hwif_out.I3C_EC.TTI.TX_DESC_QUEUE_PORT.wr_biten.TX_DESC

