        - hwif_tti_out.INTERRUPT_STATUS.RX_DESC_TIMEOUT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.TRANSFER_ERR_STAT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.TRANSFER_ABORT_STAT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.IBI_THLD_STAT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.TX_DESC_THLD_STAT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.TX_DATA_THLD_STAT.value
        - hwif_out.I3C_EC.TTI.INTERRUPT_STATUS.TX_DESC_TIMEOUT.value
